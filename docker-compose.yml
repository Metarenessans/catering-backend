services:
  db:
    image: postgres:16-alpine
    container_name: catering_db_container
    restart: always
    environment:
      POSTGRES_DB: catering_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
